<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Movies - MMDB</title>
    <link rel="stylesheet" href="allmovies.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <script>
        if (localStorage.getItem("mmdb_theme") === "light") {
            document.body.classList.add("light-mode");
        }
    </script>
    <header>
        <nav class="bar1">
            <a href="webs.html" class="logo"><h1 class="logo-txt">MMDB</h1></a>
            <ul class="bar-menu">
                <li class="bar-all"><a href="webs.html">Home</a></li>
                <li class="bar-all dropdown">
                    <a href="#" class="dropbtn">Categories <i class="fa-solid fa-caret-down" style="font-size: 0.8em; margin-left: 4px;"></i></a>
                    <div class="dropdown-content">
                        <a href="#">Action</a>
                        <a href="#">Comedy</a>
                        <a href="#">Drama</a>
                        <a href="#">Horror</a>
                        <a href="#">Sci-Fi</a>
                    </div>
                </li>
                
                <li class="bar-all"><a href="allmovies.html">All Movies</a></li>
                <li class="bar-all"><a href="about.html">About</a></li>
                <li class="bar-all"><a href="watchlist.html"><i class="fa-solid fa-bookmark" style="margin-right: 5px;"></i>Watchlist</a></li>
            </ul>
        </nav> 
    </header>
    <main class="allmovies-layout">
        <section class="movies-grid-section">
            <h2>Explore All Movies</h2>
            <div id="movieContainer" class="movie-grid">
                <h3 style="color: #ccc; width: 100%; text-align: center;">Loading movies...</h3>
            </div>
        </section>
        <aside class="sorting-sidebar">
            <div class="sort-box">
                <h3>Sort By</h3>
                <ul class="sort-options">
                    <li><button class="sort-btn active" data-sort="rating">Rating (High → Low)</button></li>
                    <li><button class="sort-btn" data-sort="date">Release Date (Newest → Oldest)</button></li>
                    <li><button class="sort-btn" data-sort="title">Title (A → Z)</button></li>
                </ul>
            </div>
        </aside>
    </main>

    <div id="toast"></div>
    <script src="allmovies.js"></script>
</body>
</html>
